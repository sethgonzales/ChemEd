<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <!-- Beaker -->
  <path d="M55 40 L55 120 L145 120 L145 40" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <line x1="50" y1="40" x2="60" y2="40" stroke="currentColor" stroke-width="2"/>
  <line x1="140" y1="40" x2="150" y2="40" stroke="currentColor" stroke-width="2"/>

  <!-- Liquid -->
  <rect x="56" y="75" width="88" height="44" fill="currentColor" opacity="0.15" rx="1"/>
  <line x1="56" y1="75" x2="144" y2="75" stroke="currentColor" stroke-width="1" opacity="0.4"/>

  <!-- Burette -->
  <rect x="95" y="2" width="10" height="25" stroke="currentColor" stroke-width="1.5" fill="none" rx="1"/>
  <line x1="98" y1="27" x2="98" y2="35" stroke="currentColor" stroke-width="1.5"/>
  <line x1="102" y1="27" x2="102" y2="35" stroke="currentColor" stroke-width="1.5"/>

  <!-- Drop -->
  <circle cx="100" cy="42" r="4" fill="currentColor" opacity="0.7"/>
  <circle cx="100" cy="50" r="3" fill="currentColor" opacity="0.5"/>

  <!-- Measurement lines on beaker -->
  <line x1="140" y1="60" x2="145" y2="60" stroke="currentColor" stroke-width="1" opacity="0.3"/>
  <line x1="140" y1="80" x2="145" y2="80" stroke="currentColor" stroke-width="1" opacity="0.3"/>
  <line x1="140" y1="100" x2="145" y2="100" stroke="currentColor" stroke-width="1" opacity="0.3"/>
</svg>
