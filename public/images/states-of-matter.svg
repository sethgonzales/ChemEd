<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <!-- Solid: tight lattice -->
  <circle cx="20" cy="105" r="5" fill="currentColor" opacity="0.9"/>
  <circle cx="32" cy="105" r="5" fill="currentColor" opacity="0.9"/>
  <circle cx="44" cy="105" r="5" fill="currentColor" opacity="0.9"/>
  <circle cx="26" cy="94" r="5" fill="currentColor" opacity="0.9"/>
  <circle cx="38" cy="94" r="5" fill="currentColor" opacity="0.9"/>
  <circle cx="20" cy="83" r="5" fill="currentColor" opacity="0.9"/>
  <circle cx="32" cy="83" r="5" fill="currentColor" opacity="0.9"/>
  <circle cx="44" cy="83" r="5" fill="currentColor" opacity="0.9"/>
  <circle cx="26" cy="116" r="5" fill="currentColor" opacity="0.9"/>
