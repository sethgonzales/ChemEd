  <circle cx="105" cy="105" r="5" fill="currentColor" opacity="0.7"/>
  <circle cx="88" cy="98" r="5" fill="currentColor" opacity="0.7"/>
  <circle cx="100" cy="94" r="5" fill="currentColor" opacity="0.7"/>
  <circle cx="78" cy="118" r="5" fill="currentColor" opacity="0.7"/>
  <circle cx="92" cy="120" r="5" fill="currentColor" opacity="0.7"/>
  <circle cx="108" cy="116" r="5" fill="currentColor" opacity="0.7"/>
  <text x="93" y="135" text-anchor="middle" font-family="Arial" font-size="9" fill="currentColor" opacity="0.6">Liquid</text>

  <!-- Gas: scattered -->
  <circle cx="145" cy="20" r="5" fill="currentColor" opacity="0.5"/>
  <circle cx="175" cy="45" r="5" fill="currentColor" opacity="0.5"/>
  <circle cx="155" cy="70" r="5" fill="currentColor" opacity="0.5"/>
  <circle cx="185" cy="15" r="5" fill="currentColor" opacity="0.5"/>
  <circle cx="140" cy="95" r="5" fill="currentColor" opacity="0.5"/>
  <circle cx="170" cy="85" r="5" fill="currentColor" opacity="0.5"/>
  <circle cx="190" cy="110" r="5" fill="currentColor" opacity="0.5"/>
  <circle cx="150" cy="115" r="5" fill="currentColor" opacity="0.5"/>
  <text x="165" y="135" text-anchor="middle" font-family="Arial" font-size="9" fill="currentColor" opacity="0.6">Gas</text>

  <!-- Divider lines -->
  <line x1="62" y1="10" x2="62" y2="130" stroke="currentColor" stroke-width="0.5" opacity="0.2"/>
  <line x1="128" y1="10" x2="128" y2="130" stroke="currentColor" stroke-width="0.5" opacity="0.2"/>
</svg>
