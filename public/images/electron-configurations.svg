<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <!-- Nucleus -->
  <circle cx="100" cy="70" r="10" fill="currentColor" opacity="0.9"/>

  <!-- Orbital rings -->
  <ellipse cx="100" cy="70" rx="30" ry="30" stroke="currentColor" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <ellipse cx="100" cy="70" rx="50" ry="50" stroke="currentColor" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <ellipse cx="100" cy="70" rx="65" ry="65" stroke="currentColor" stroke-width="1" stroke-dasharray="4 3" opacity="0.3"/>

  <!-- Electrons on 1st shell -->
  <circle cx="125" cy="52" r="5" fill="currentColor" opacity="0.8"/>
  <circle cx="75" cy="88" r="5" fill="currentColor" opacity="0.8"/>

  <!-- Electrons on 2nd shell -->
  <circle cx="140" cy="42" r="5" fill="currentColor" opacity="0.7"/>
  <circle cx="60" cy="98" r="5" fill="currentColor" opacity="0.7"/>
  <circle cx="120" cy="110" r="5" fill="currentColor" opacity="0.7"/>
  <circle cx="55" cy="45" r="5" fill="currentColor" opacity="0.7"/>

  <!-- Electron on 3rd shell -->
  <circle cx="165" cy="62" r="5" fill="currentColor" opacity="0.6"/>

  <!-- Shell labels -->
  <text x="100" y="74" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="8" fill="white">+</text>
</svg>
